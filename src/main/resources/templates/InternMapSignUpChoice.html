<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/head}">

<head>
    <title>Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/InternMapSignUpChoice.css}">
<!--    <link rel="stylesheet" th:href="@{/css/InternMapSignUp.css}">-->
    <link rel="stylesheet" th:href="@{/css/Universal.css}">
</head>

<body>
<div th:replace="~{fragments/Notification}"></div>
    <div class="centered">
    <div id="segmented-control" style="display: flex; flex-direction: row; gap: 10px;">
        <input type="radio" id="admin" name="role" value="admin-view" style="">
        <label for="admin">Admin</label>
        <br>
        <input type="radio" id="student" name="role" value="student-view" style="" checked>
        <label for="student">Student</label>
        <br>
        <input type="radio" id="recruiter" name="role" value="recruiter-view" style="">
        <label for="recruiter">Recruiter</label>
        <br>
    </div>
    <div style="display: flex; flex-direction: row; gap: 30px;">


        <div class="signup-view" id="admin-view" style="display: none;">
        <a th:href="@{/admin/register}" style="text-decoration: none; color: black;">
            <div class="flex-button">
                <div class="vertical-container">
                    <img src="/images/server_rack.png" height="60" width="77" alt="Server Rack" style="margin-top: 15px;"/>
                    <abbr style="margin-top: 12px;">Admin</abbr>
                </div>
            </div>
        </a>
        </div>

        <div class="signup-view" id="student-view">
        <a th:href="@{/student/register}" style="text-decoration: none; color: black;">
            <div class="flex-button">
                <div class="vertical-container">
                    <img src="/images/Graduation_cap.png" height="81" width="76.87" alt="Graduation Cap"/>
                    Student
                </div>
            </div>
        </a>
        </div>

        <div class="signup-view" id="recruiter-view" style="display: none;">
        <a th:href="@{/recruiter/register}" style="text-decoration: none; color: black;">
            <div class="flex-button">
                <div class="vertical-container">
                    <img src="/images/Suitcase.png" height="63" width="75" alt="Suitcase" style="margin-top: 12px;"/>
                    Recruiter
                </div>
            </div>
        </a>
        </div>
    </div>
    </div>
</body>

<!--<div th:replace="~{fragments/footer}"></div>-->
</html>
