<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="icon" type="image/png" href="/images/Logo%20With%20Shadow.png">
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<div class="horizontally-centered-container">
    <img src="/Images/Logo With Shadow.png" alt="Logo" style="width: 100px; height: 100px; margin-bottom: 15px;">
    <form th:action="@{/login}" th:object="${user}" method="post">
        <h1>Log in</h1>
        <div th:if="${errorMessage}"
             style="color:red;border:0 solid red;padding:2px;margin-bottom:5px; font-weight: 550;">
            <p th:text="${errorMessage}"></p></div>
        <div class="form-container">
            <label for="email">Email:</label>
            <input th:field="*{email}" type="email" id="email" name="email" placeholder="example@gmail.com" required><br><br>
            <label for="password">Password:</label>
            <input th:field="*{plainPassword}" type="password" id="password" name="password" placeholder="Enter your password" required><br><br>
            <input type="submit" value="Log In">
        </div>
        <br>
        <p style="font-size: 14px; font-weight: 400;">Want to sign up first? <a style="color: rgb(49, 131, 254); font-weight: 600;" th:href="@{/signup-choice}">Sign up</a></p>
    </form>
    <!-- <h6>Tip: No AI was used in the creation of this page 🫡</h6> -->
</div>
