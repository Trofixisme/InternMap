<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head data-th-src="~{fragments/head}">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/CSS/InternMapSignIn.css}">
</head>

<body>
<header th:replace="~{fragments/header}"></header>
<h2 class="form-title">Sign up</h2>
<div class="form-container">
    <div th:if="${errorMessage}"
         style="color:red;border: 0 solid red;padding:2px;margin-bottom:15px; font-weight: 550;">
        <p th:text="${errorMessage}"></p></div>
<form th:action="@{/recruiter/register}"
      th:object="${form}"
      method="post">
    <div class="form-row">
        <div class="form-group">
            <label>
                <input type="text"
                       class="form-input"
                       th:field="*{user.FName}"
                       placeholder="First name"
                       required />
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="text"
                       class="form-input"
                       th:field="*{user.LName}"
                       placeholder="Last name"
                       required />
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="email"
                       class="form-input"
                       th:field="*{user.email}"
                       placeholder="Email"
                       required />
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="password"
                       class="form-input"
                       th:field="*{user.password}"
                       placeholder="Password"
                       required />
            </label>
        </div>

        <div class="form-group">
            <label>
                <input type="text"
                       class="form-input"
                       th:field="*{user.title}"
                       placeholder="Title"
                       required />
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="text"
                       class="form-input"
                       th:field="*{company.name}"
                       placeholder="Company's name">
            </label>
        </div>
    </div>
    <button type="submit" class="form-submit">Create Account</button>
</form>

    <p class="form-link">
        If your company doesn't exist, you can
        <a th:href="@{/recruiter/company/register}">create a company</a>
    </p>
    <p class="form-link">
        Already have an account?
        <a th:href="@{/login}">Sign in</a>
    </p>

</div>
<div th:replace="~{fragments/footer}"></div>
</body>
</html>
