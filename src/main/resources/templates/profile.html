<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
        <link rel="stylesheet" href="/CSS/Universal.css">
    <link rel="icon" type="image/png" href="/images/Navi/Navi%20Unique.png">
    <title>User Profile</title>
</head>

<body class="font-inter">

<h1 class="page-header">Profile</h1>

<!-- Profile Container -->
<div class="centered-container-full-width">
        <div>
            <label class="label-small">Full Name</label>
            <p th:text="${user.FName}" class="auto-capitalise"></p>
        </div>

        <div>
            <label class="label-small">Email</label>
            <p th:text="${user.email}"></p>
        </div>

        <div>
            <label class="label-small">Role</label>
            <p th:text="${type}" class="auto-capitalise"></p>
        </div>

        <hr>

        <!-- Student Fields -->
        <div th:if="${type == 'student'}">

            <h4 class="label-large">Student Details</h4>

            <div>
                <label class="label-small">Major</label>
                <p th:text="${student.studentMajor}" class="auto-capitalise"></p>
            </div>

            <div class="mb-3">
                <label class="label-small">Year</label>
                <p th:text="${student.graduatingYear}" class="auto-capitalise"></p>
            </div>

            <div class="mb-3">
                <label class="label-small">University</label>
                <p th:text="${student.uniName}" class="auto-capitalise"></p>
            </div>

            <!-- CV Section -->
            <h4 class="label-large">Curriculum Vitae</h4>

            <div th:if="${student.cv != null}">

                <div>

                    <div>
                        <label class="label-small">Professional Summary</label>
                        <p th:text="${student.cv.description}" class="auto-capitalise"></p>
                    </div>

                    <div>
                        <label class="label-small">Past Experiences</label>
                        <p th:text="${student.cv.pastExperiences}"
                           style="white-space: pre-wrap;"></p>
                    </div>

                    <div>
                        <label class="label-small">Projects</label>
                        <p th:text="${student.cv.projects}"
                           style="white-space: pre-wrap;"></p>
                    </div>

                </div>

                <div>
                    <a th:if="${loggedInUser != null && loggedInUser.id == user.id }" href="/cv" class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil"></i> Edit CV
                    </a>
                </div>

            </div>

            <div th:if="${student.cv == null}">
                <p class="text-muted mb-3">You haven't created a CV yet.</p>
                <a href="/cv" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Create CV
                </a>
            </div>


        </div>

        <!-- Recruiter Fields -->
        <div th:if="${type == 'recruiter'}">

            <h4 class="label-large">Recruiter Details</h4>

            <div>
                <label class="label-small">Position</label>
                <p th:text="${recruiter.title}" class="auto-capitalise"></p>
            </div>

            <div>

                <label class="label-small">Companies</label>
                <br><br>

                <!-- If a recruiter has one or more companies -->
                <div th:if="${!#lists.isEmpty(recruiter.companies)}">

                    <table class="table">
                        <thead>
                        <tr>
                            <th class="inner-table">Company Name</th>
                            <th class="inner-table">Industry</th>
                        </tr>
                        </thead>

                        <tbody class="inner-table">
                        <tr class="inner-table" th:each="company : ${recruiter.companies}">
                            <td class="inner-table" th:text="${company.name}">Company Name</td>
                            <td class="inner-table" th:text="${company.industry}">Industry</td>
                        </tr>
                        </tbody>

                    </table>

                </div>

                <!-- If the recruiter has no companies -->
                <p th:if="${#lists.isEmpty(recruiter.companies)}"
                   class="auto-capitalise">
                    — You're not working for any company.
                </p>

            </div>
        </div>
        <!-- Admin Fields -->
<!--        <div th:if="${type == 'admin'}">-->
<!--            <h4 class="text-primary mb-3">Admin Details</h4>-->
<!--        </div>-->
<!--        <hr>-->

        <br>

        <!-- Buttons -->
        <div>
        <button onclick="window.location.href = '/'" class="grid-button">Home</button>

<!--            <a th:href="@{'/profile/edit'}" class="btn btn-primary">Edit Profile</a>-->
        </div>
    </div>
</body>
</html>
