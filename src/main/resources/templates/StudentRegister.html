<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head data-th-src="~{fragments/head}">
    <title>Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/InternMapSignIn.css}">
</head>

<body>
<header th:replace="~{fragments/header}"></header>
<h2 class="form-title">Sign up</h2>
<div class="form-container">
<form  th:action="@{/student/register}" th:object="${user}" method="post">

    <div th:if="${errorMessage}"
         style="color:red;border:0 solid red;padding:2px;margin-bottom:15px; font-weight: 550;">
        <p th:text="${errorMessage}"></p></div>
    <div class="form-row">
    <div class="form-group">
        <input type="text"
               class="form-input"
               th:field="*{fName}"
               placeholder="First name"
               required />
    </div>
    <div class="form-group">
        <input type="text"
               class="form-input"
               th:field="*{lName}"
               placeholder="Last name"
               required />
    </div>
    <div class="form-group">
        <input type="email"
               class="form-input"
               th:field="*{email}"
               placeholder="Email"
               required />
    </div>
    <div class="form-group">
        <input type="password"
               class="form-input"
               th:field="*{password}"
               placeholder="Password"
               required />
    </div>
    <div class="form-group">
        <input type="text"
               class="form-input"
               th:field="*{graduatingYear}"
               placeholder="Graduating Year"
               required />
    </div>

    <div class="form-group">
        <input type="text"
               class="form-input"
               th:field="*{uniName}"
               placeholder="University"
               required />
    </div>
    <div class="form-group">
        <input type="text"
               class="form-input"
               th:field="*{studentMajor}"
               placeholder="Major"
               required />
    </div>
    <div class="form-group">
        <input type="text"
               class="form-input"
               th:field="*{faculty}"
               placeholder="Faculty"
               required />
    </div>
    </div>
    <button type="submit" class="form-submit">Create Account</button>
</form>
<p class="form-link">
    Already have an account?
    <a th:href="@{/login}">Sign in</a>
</p>
</div>
<footer th:replace="~{fragments/indexFooter}"></footer>

</body>
</html>
