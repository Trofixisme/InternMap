<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" th:href="@{/CSS/InternMapSignIn.css}">
    <link rel="stylesheet" th:href="@{/CSS/header.css}">
</head>

<body>
<header th:replace="~{fragments/header}"></header>

<h2 class="form-title">Admin Sign Up</h2>

<div class="form-container">
    <div th:if="${errorMessage}"
         style="color:red;border: 0 solid red;padding:2px;margin-bottom:15px; font-weight: 550;">
        <p th:text="${errorMessage}"></p>
    </div>
    <form th:action="@{/admin/register}"
          th:object="${user}"
          method="post">
        <div class="form-row">
            <div class="form-group">
                <input type="text"
                       class="form-input"
                       th:field="*{fName}"
                       placeholder="First name"
                       required />
            </div>
            <div class="form-group">
                <input type="text"
                       class="form-input"
                       th:field="*{lName}"
                       placeholder="Last name"
                       required />
            </div>
            <div class="form-group">
                <input type="email"
                       class="form-input"
                       th:field="*{email}"
                       placeholder="Email"
                       required />
            </div>
            <div class="form-group">
                <input type="password"
                       class="form-input"
                       th:field="*{plainPassword}"
                       placeholder="Password"
                       required />
            </div>
        </div>
        <button type="submit" class="form-submit">Create Account</button>
    </form>

    <p class="form-link">
        Already have an account?
        <a th:href="@{/login}">Sign In</a>
    </p>
</div>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
