<!Doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/head}">
<head>
    <title>Log in</title>
    <link rel="icon" type="image/png" href="/Images/Navi/Navi%20Unique%20(Shadow-less).png">
    <link rel="stylesheet" th:href="@{/css/Universal.css}">

    <script>

        let stompClient = null;

        function connect() {
            let socket = new SockJS('/ws'); // must match your config
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);

                // VERY IMPORTANT
                stompClient.subscribe('/user/queue/notifications', function (notification) {
                    showNotification(notification.body);
                });
            });
        }

        function showNotification(message) {
            let box = document.getElementById("notificationBox");
            box.innerText = message;
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 4000);
        }

        connect();
    </script>
</head>

<body>
<div th:replace="~{fragments/Notification}"></div>
<div class="centered">
    <a th:href="@{/}" style="border-radius: 200px;" inert><img src="/Images/Navi/Navi%20Unique.png" alt="Logo" style="width: 100px; height: 100px;"></a>
    <br>

    <form class="container" th:action="@{api/auth/login}" method="post">
        <!--/*@thymesVar id="errorMessage" type="String"*/-->
        <div th:if="${errorMessage}" style="color:red;border:0 solid red; padding:2px; margin-bottom:5px; font-weight: 550;">
            <p th:text="${errorMessage}"></p>
        </div>

        <h1>Log in</h1>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="example@gmail.com" required autocomplete="email"><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>
        <input type="submit" value="Log In">
        <br>
        <p style="font-size: 14px; font-weight: 400;">Need to sign up first? <a style="color: rgb(49, 131, 254); font-weight: 600; border-radius: 200px;: " th:href="@{/signup}">Sign up</a></p>
        <br>
    </form>
</div>
</body>
