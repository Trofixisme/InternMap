<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{fragments/head}">
<head>
    <title>Create a Job Posting</title>
    <link rel="stylesheet" th:href="@{/CSS/InternMapSignIn.css}">
</head>

<header>
    <div class="header-top">
        <nav class="header-nav">
            <a th:href="@{/login}">
                <button class="btn-header primary">Sign In</button>
            </a>
        </nav>
    </div>
    <div class="header-hero">
        <img class="logo" src="/Images/Navi/Navi%20Unique.png" alt="Logo">
    </div>
</header>

<body>
<div th:replace="~{fragments/Notification}"></div>
<h2 class="form-title">Create a Job Posting</h2>
<div class="form-container">

    <div th:if="${success}"
         style="color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; padding: 12px; margin-bottom: 20px; border-radius: 8px;">
        <p th:text="${success}" style="margin: 0;"></p>
    </div>

    <div th:if="${errorMessage}"
         style="color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 12px; margin-bottom: 20px; border-radius: 8px;">
        <p th:text="${errorMessage}" style="margin: 0;"></p>
    </div>

    <form th:action="@{/JobPostingForm}" method="post" novalidate>
        <input type="hidden" name="jobPostingType" id="jobPostingTypeHidden" value="">

        <div class="form-row">
            <!-- Job Type Selection First -->
            <div class="form-group">
                <label>
                    <select class="form-input" id="jobTypeSelect" th:field="${jobPostingFactory.jobType}" required>
                        <option value="" disabled selected>Select Job Type</option>
                        <option value="Internship" th:field="${jobPostingFactory.jobType}">Internship</option>
                        <option value="FullTime" th:field="${jobPostingFactory.jobType}">Full Time</option>
                        <option value="FreeLanceProject" th:field="${jobPostingFactory.jobType}">Freelance Project</option>
                    </select>
                </label>
            </div>

            <!-- Common Fields -->
            <div class="form-group">
                <label>
                    <input type="text"
                           class="form-input"
                           name="jobName"
                           placeholder="Job Title"
                           th:field="${jobPostingFactory.jobPosting.jobName}"
                           required />
                </label>
            </div>



            <div class="form-group">
                <label>
                    <input type="text"
                           class="form-input"
                           name="jobDescription"
                           placeholder="Job Description"
                           th:field="${jobPostingFactory.jobPosting.jobDescription}"
                           required />
                </label>
            </div>

            <div class="form-group">
                <label>
                    <input type="text"
                           class="form-input"
                           name="jobRequirements"
                           placeholder="Job Requirements"
                           th:field="${jobPostingFactory.jobPosting.jobRequirements}"
                           required />
                </label>
                <input type="text"
                       class="form-input"
                       name="company.name"
                       id="CompanyName"
                       placeholder="company name"
                       th:field="${jobPostingFactory.company.name}" />
            </div>

            <!-- Full Time Specific Fields -->
            <div id="fullTimeFields" style="display: none;">
                <div class="form-group">
                    <label>
                        <input type="text"
                               class="form-input"
                               name="benefits"
                               placeholder="Benefits"
                               id="fullTimeBenefits"
                               th:field="${jobPostingFactory.fullTime.benefits}"
                        />
                    </label>
                </div>

            </div>

            <!-- Internship Specific Fields -->
            <div id="internshipFields" style="display: none;">
                <div class="form-group">
                    <label>
                        <input type="text"
                               class="form-input"
                               name="duration"
                               placeholder="Duration (e.g., 3 months)"
                               id="internshipDuration"
                               th:field="${jobPostingFactory.internship.duration}"
                        />
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="text"
                               class="form-input"
                               name="location"
                               placeholder="Location"
                               id="internshipLocation"
                               th:field="${jobPostingFactory.internship.jobLocation}"
                        />
                    </label>
                </div>

            </div>

            <!-- Freelance Project Specific Fields -->
            <div id="freeLanceProjectFields" style="display: none;">
                <div class="form-group">
                    <label>
                        <input type="text"
                               class="form-input"
                               name="duration"
                               placeholder="Duration"
                               id="freelanceDuration"
                               th:field="${jobPostingFactory.freelanceProject.duration}"
                        />
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="text"
                               class="form-input"
                               name="payout"
                               placeholder="Payout"
                               id="freelancePayout"
                               th:field="${jobPostingFactory.freelanceProject.payout}"
                        />
                    </label>
                </div>
                <div class="form-group">
                    <label>
<!--                        /*@thymesVar id="freelanceLocation" type="com.group.InternMap.Job.FreelanceProject"*/-->
                        <input type="text"
                               class="form-input"
                               name="jobLocation"
                               placeholder="Location"
                               id="freelanceLocation"
                               th:field="${jobPostingFactory.freelanceProject.jobLocation}"
                        />
                    </label>
                </div>
            </div>
        </div>

        <button type="submit" class="form-submit">Create Posting</button>
    </form>
</div>
<div th:replace="~{fragments/footer}"></div>
</body>

<script>
    function toggleJobSpecificFields() {
        let selectElement = document.getElementById("jobTypeSelect");
        let selectedValue = selectElement.value;

        // Update hidden field
        document.getElementById("jobPostingTypeHidden").value = selectedValue;

        // Get all field containers
        let fullTimeDiv = document.getElementById("fullTimeFields");
        let internshipDiv = document.getElementById("internshipFields");
        let freelanceDiv = document.getElementById("freeLanceProjectFields");

        // Hide all fields first
        fullTimeDiv.style.display = "none";
        internshipDiv.style.display = "none";
        freelanceDiv.style.display = "none";

        // Clear required attributes from all hidden fields
        clearRequired("fullTimeBenefits");
        clearRequired("fullTimeLocation");
        clearRequired("internshipDuration");
        clearRequired("internshipLocation");
        clearRequired("freelanceDuration");
        clearRequired("freelancePayout");
        clearRequired("freelanceLocation");

        // Show selected fields and set required
        if (selectedValue === "FullTime") {
            fullTimeDiv.style.display = "block";
            setRequired("fullTimeBenefits");
            setRequired("fullTimeLocation");
        } else if (selectedValue === "Internship") {
            internshipDiv.style.display = "block";
            setRequired("internshipDuration");
            setRequired("internshipLocation");
        } else if (selectedValue === "FreeLanceProject") {
            freelanceDiv.style.display = "block";
            setRequired("freelanceDuration");
            setRequired("freelancePayout");
            setRequired("freelanceLocation");
        }
    }

    function setRequired(elementId) {
        let element = document.getElementById(elementId);
        if (element) {
            element.required = true;
        }
    }

    function clearRequired(elementId) {
        let element = document.getElementById(elementId);
        if (element) {
            element.required = false;
            element.value = "";
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        let selectElement = document.getElementById("jobTypeSelect");
        if (selectElement) {
            selectElement.addEventListener('change', toggleJobSpecificFields);
        }
        toggleJobSpecificFields();
    });
</script>

</html>
