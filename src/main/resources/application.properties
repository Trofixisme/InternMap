spring.config.import=env.properties

spring.application.name=InternMap

spring.banner.location=classpath:banner.txt
spring.banner.charset=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
Server.port=8050
server.shutdown=graceful

spring.datasource.url=jdbc:mysql://${env.db.host}:${env.db.port}/${env.db.database}

spring.datasource.username=${env.db.username}
spring.datasource.password=${env.db.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

spring.flyway.enabled=false

# ===== CONNECTION POOL (Performance) =====
# Maximum number of database connections
spring.datasource.hikari.maximum-pool-size=10

# Minimum number of idle connections to maintain
spring.datasource.hikari.minimum-idle=5

# Maximum time (ms) to wait for a connection from the pool
spring.datasource.hikari.connection-timeout=20000

# Option A: Preferable ? avoid using reserved name by mapping entity to a different table name.
# (No change required here for that approach)

# Option B: If you must keep the table name "users", enable global quoting so Hibernate emits "users"
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Optional safety: disable automatic schema create to prevent startup failures while you fix mappings
# spring.jpa.hibernate.ddl-auto=none

# Or set to update if you want Hibernate to attempt safe updates
# spring.jpa.hibernate.ddl-auto=update
